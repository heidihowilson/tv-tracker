services:
  tv-tracker:
    build: .
    expose:
      - "8000"
    networks:
      - coolify
    volumes:
      - tv-tracker-data:/data
    environment:
      - DB_PATH=/data/tracker.db
      - PORT=8000
      - AUTH_TOKEN=${AUTH_TOKEN}
      - API_KEY=${API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

# Plain named volume — must NOT be `external: true` (Coolify 4.0.0-beta.463 won't
# provision external volumes and the deploy fails). Coolify's compose pack uses the
# app uuid as the compose project name, so this resolves to the pre-existing
# `t8gw8skk00cs8cowk8c8ooc8_tv-tracker-data` volume: same data, zero migration.
volumes:
  tv-tracker-data:

networks:
  coolify:
    external: true
